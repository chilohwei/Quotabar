name: Build macOS Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version override (for example 1.2.3)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x86_64
          - universal
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -z "$version" ]]; then
            version="0.0.0-${GITHUB_RUN_NUMBER}"
          fi

          build_number="$(date -u +%Y%m%d%H%M)"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Validate release version
        shell: bash
        run: |
          version="${{ steps.meta.outputs.version }}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            scripts/release_version.sh check "$version" --exclude-version "$version"
          elif [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            scripts/release_version.sh check "$version"
          else
            echo "Skipping release version validation for non-release build version: $version"
          fi

      - name: Run tests
        shell: bash
        run: swift test

      - name: Build DMG
        shell: bash
        run: |
          skip_check=false
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            skip_check=true
          fi
          BUILD_NUMBER="${{ steps.meta.outputs.build_number }}" \
          QUOTABAR_SKIP_REMOTE_VERSION_CHECK="$skip_check" \
          bash scripts/build_macos_app.sh \
            --arch "${{ matrix.arch }}" \
            --version "${{ steps.meta.outputs.version }}"

      - name: Inspect build outputs
        shell: bash
        run: |
          ls -la dist
          ls -la dist/releases
          codesign --verify --deep --strict --verbose=2 "dist/QuotaBar-${{ matrix.arch }}.app"
          test -s "dist/releases/QuotaBar-${{ steps.meta.outputs.version }}-${{ matrix.arch }}.dmg.sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: quotabar-${{ matrix.arch }}
          path: |
            dist/releases/*-${{ matrix.arch }}.dmg
            dist/releases/*-${{ matrix.arch }}.dmg.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/releases
          pattern: quotabar-*
          merge-multiple: true

      - name: Create release and upload DMG files
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/releases/*.dmg
            dist/releases/*.dmg.sha256
